<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desafio</title>
    <script>
        var nome = prompt ('Qual seu nome?');
        var Salario = parseInt(prompt('Qual seu salario?'));
        var vendas = prompt ('Qual o valor de suas vendas?');
    </script>
</head>
<body>
    <script>
        var comissão = vendas * 0.025;
        Salario = Salario + comissão;

    document.write('<h1>Ola ' + nome + ',seu salario é de ' + Salario +' correto?</h1>')
    </script>
</body>
</html>
