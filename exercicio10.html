<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var Dias = prompt('digite os dias');
    
        switch (Dias) {
            case '28':
                document.write('mes 02')
                break
                 case '30':
                 document.write('mes 04, 06, 09, 11')
                break
                 case '31':
                 document.write('mes 01, 03, 05, 07, 08, 10, 12')
                 break

                default:
                    document.write('nenhum mes');
        }
    </script>
</head>
