<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var conceito = prompt('digite seu conceito');
    
        switch (conceito) {
            case 'A':
                document.write('Excelente')
                break
                 case 'B':
                 document.write('otimo')
                break
                 case 'C':
                 document.write('bom')
                break
                 case 'D':
                 document.write('regular')
                break
                 case 'E':
                 document.write('ruim')
                break
                 case 'F':
                 document.write('nos vemos ano que vem')
                break
                default:
                    document.write('nao encontrado');
        }
    </script>
</head>
